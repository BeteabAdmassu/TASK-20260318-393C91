spring:
  datasource:
    url: jdbc:h2:mem:mindflow;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: never

app:
  jwt:
    secret: VGVzdF9FbnZfSldUX1NlY3JldF9CYXNlNjRfMzJfQnl0ZXNfVmFsaWRfMTIzNDU2Nzg=
  bootstrap:
    admin:
      enabled: false
  monitoring:
    queue-backlog-threshold: 3
    api-p95-threshold-ms: 500
